<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Approved Hospital Directory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="text-center mb-4">Approved Hospitals List (Transplant & Retrieval Centers)</h2>

    <form action="hospital_directory.php" method="GET" class="row g-3 mb-4">
      <div class="col-md-3">
        <input type="text" name="name" class="form-control" placeholder="Hospital Name">
      </div>
      <div class="col-md-2">
        <select name="type" class="form-select">
          <option value="">All Types</option>
          <option value="Transplant">Transplant</option>
          <option value="Retrieval">Retrieval</option>
        </select>
      </div>
      <div class="col-md-2">
        <select name="organ" class="form-select">
          <option value="">All Organs</option>
          <option value="Kidney">Kidney</option>
          <option value="Liver">Liver</option>
          <option value="Heart">Heart</option>
          <option value="Lung">Lung</option>
          <option value="Cornea">Cornea</option>
        </select>
      </div>
      <div class="col-md-2">
        <select name="state" class="form-select">
          <option value="">All States</option>
          <option value="Telangana">Telangana</option>
          <option value="Delhi">Delhi</option>
          <option value="Gujarat">Gujarat</option>
          <!-- Add more states -->
        </select>
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Search</button>
      </div>
    </form>
  </div>
</body>
</html>
