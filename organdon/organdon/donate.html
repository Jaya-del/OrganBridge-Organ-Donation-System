<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donate – OrganBridge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f9ff;
    }
    .donate-header {
      background: linear-gradient(135deg, #dff1ff, #ffffff);
      padding: 3rem 1rem;
      text-align: center;
    }
    .donate-header h1 {
      color: #0d6efd;
      font-weight: 700;
    }
    .amount-btn {
      border: 2px solid #0d6efd;
      color: #0d6efd;
      transition: 0.3s;
    }
    .amount-btn.active, .amount-btn:hover {
      background-color: #0d6efd;
      color: #fff;
    }
    .form-section {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

<!-- Header -->
<section class="donate-header">
  <div class="container">
    <h1>Support Organ Donation</h1>
    <p class="lead text-muted">Your donation helps save lives and raise awareness.</p>
  </div>
</section>

<!-- Form -->
<div class="container my-5">
  <div class="form-section">
    <form id="donationForm" action="donate_submit.php" method="POST">
      <h4 class="text-primary mb-4">Choose Donation Amount</h4>
      <div class="mb-3 d-flex flex-wrap gap-3">
        <button type="button" class="btn amount-btn" data-amount="500">₹500</button>
        <button type="button" class="btn amount-btn" data-amount="1000">₹1000</button>
        <button type="button" class="btn amount-btn" data-amount="2500">₹2500</button>
        <button type="button" class="btn amount-btn" data-amount="5000">₹5000</button>
        <button type="button" class="btn amount-btn" data-amount="other">Other</button>
      </div>

      <div class="mb-3" id="customAmountDiv" style="display:none;">
        <label for="customAmount" class="form-label">Enter Custom Amount (₹)</label>
        <input type="number" class="form-control" id="customAmount" min="1" />
      </div>

      <input type="hidden" name="amount" id="finalAmount" required>

      <h4 class="text-primary mt-4 mb-3">Your Information</h4>
      <div class="mb-3">
        <label for="donorName" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="donorName" name="name" required />
      </div>
      <div class="mb-3">
        <label for="donorEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="donorEmail" name="email" required />
      </div>
      <div class="mb-3">
        <label for="donorMessage" class="form-label">Message (Optional)</label>
        <textarea class="form-control" id="donorMessage" name="message" rows="3"></textarea>
      </div>

      <h4 class="text-primary mt-4 mb-3">Contact & ID Details</h4>
      <div class="mb-3">
        <label for="donorPhone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="donorPhone" name="phone" required />
      </div>

      <div class="mb-3">
        <label for="donorAddress" class="form-label">Full Address</label>
        <textarea class="form-control" id="donorAddress" name="address" rows="3" required></textarea>
      </div>

      <div class="mb-3">
        <label for="idProofType" class="form-label">Select ID Proof</label>
        <select class="form-select" id="idProofType" name="id_type" required>
          <option value="">-- Choose --</option>
          <option value="Aadhaar">Aadhaar</option>
          <option value="PAN">PAN Card</option>
          <option value="Voter ID">Voter ID</option>
          <option value="Passport">Passport</option>
          <option value="Driving License">Driving License</option>
        </select>
      </div>

      <div class="mb-4">
        <label for="idNumber" class="form-label">ID Proof Number</label>
        <input type="text" class="form-control" id="idNumber" name="id_number" required />
      </div>

      <button type="submit" class="btn btn-success px-4">Donate Now</button>
    </form>
  </div>
</div>

<!-- Script -->
<script>
  const amountButtons = document.querySelectorAll('.amount-btn');
  const customAmountDiv = document.getElementById('customAmountDiv');
  const customAmountInput = document.getElementById('customAmount');
  const finalAmountInput = document.getElementById('finalAmount');
  let selectedAmount = null;

  amountButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      amountButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedAmount = btn.getAttribute('data-amount');

      if (selectedAmount === 'other') {
        customAmountDiv.style.display = 'block';
        customAmountInput.required = true;
        finalAmountInput.value = '';
      } else {
        customAmountDiv.style.display = 'none';
        customAmountInput.required = false;
        customAmountInput.value = '';
        finalAmountInput.value = selectedAmount;
      }
    });
  });

  document.getElementById('donationForm').addEventListener('submit', function (e) {
    if (!selectedAmount) {
      alert("Please select a donation amount.");
      e.preventDefault();
      return;
    }

    if (selectedAmount === 'other') {
      const customVal = customAmountInput.value;
      if (!customVal || parseInt(customVal) <= 0) {
        alert("Please enter a valid custom amount.");
        e.preventDefault();
        return;
      }
      finalAmountInput.value = customVal;
    }
  });
</script>

</body>
</html>
