<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrganBridge | Volunteer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .form-wrapper {
      max-width: 600px;
      width: 100%;
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      animation: slideIn 0.5s ease-out;
    }
    h1 {
      color: #0d6efd;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }
    .lead {
      text-align: center;
      color: #6c757d;
      margin-bottom: 30px;
    }
    .form-label {
      font-weight: 600;
    }
    .btn-blue {
      background-color: #0d6efd;
      color: white;
      border-radius: 30px;
      padding: 10px 25px;
      font-weight: 700;
      transition: 0.3s;
    }
    .btn-blue:hover {
      background-color: #0a58ca;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <h1>Become a Volunteer</h1>
    <p class="lead">Join our mission to save lives. Help us organize, spread awareness, and serve with compassion.</p>

    <form action="submit_volunteer.php" method="POST">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name *</label>
        <input type="text" id="name" name="name" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address *</label>
        <input type="email" id="email" name="email" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number *</label>
        <input type="tel" id="phone" name="phone" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="location" class="form-label">Location *</label>
        <input type="text" id="location" name="location" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="interest" class="form-label">Why do you want to volunteer?</label>
        <textarea id="interest" name="interest" class="form-control" rows="4" required></textarea>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-blue">Submit Application</button>
      </div>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
