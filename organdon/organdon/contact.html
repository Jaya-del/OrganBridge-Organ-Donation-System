<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrganBridge | Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #f8f9fc;
      line-height: 1.6;
    }
    .container {
      margin-top: 6rem;
      margin-bottom: 4rem;
    }
    h1, h2 {
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .contact-details p {
      margin-bottom: 0.5rem;
      color: #555;
    }
    .contact-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 2rem;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }
    .btn-blue {
      background-color: #0d6efd;
      color: #fff;
      border-radius: 25px;
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: 700;
      transition: background-color 0.3s ease;
      display: inline-block;
      text-align: center;
      border: none;
    }
    .btn-blue:hover {
      background-color: #0a58ca;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-12 text-center mb-5">
        <h1>Contact Us</h1>
        <p class="lead text-muted">Get in touch with us for more information and support.</p>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="contact-details">
          <h2>Our Details</h2>
          <p><strong>Address:</strong></p>
          <p>D 119, Defence Colony,<br>New Delhi, Delhi 110024, India</p>
          <p><strong>Phone:</strong> <a href="tel:+911141838382" style="text-decoration: none; color: #0d6efd;">011-41838382</a></p>
          <p><strong>Email:</strong> <a href="mailto:info@organindia.org" style="text-decoration: none; color: #0d6efd;">info@organindia.org</a></p>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="contact-card">
          <h2>Send Us A Message</h2>
          <form action="contact_submit.php" method="POST">
            <div class="row mb-3">
              <div class="col-md-6 mb-3 mb-md-0">
                <input type="text" name="name" class="form-control" placeholder="Your Name" required>
              </div>
              <div class="col-md-6">
                <input type="email" name="email" class="form-control" placeholder="Your Email" required>
              </div>
            </div>
            <div class="mb-3">
              <input type="text" name="subject" class="form-control" placeholder="Subject" required>
            </div>
            <div class="mb-3">
              <textarea name="message" rows="5" class="form-control" placeholder="Your Message" required></textarea>
            </div>
            <div class="text-end">
              <button type="submit" class="btn-blue">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
